<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(33, 33, 33);
        }

        body {
            display: grid;
            place-items: center;
            height: 100vh;
        }

        h1 {
            opacity: 0;
            display: block;
            font-size: 144px;
            color: rgb(250, 250, 250);
        }

        .fade-in {
            opacity: 0;
            animation: fadeIn 1s ease-in-out;
            animation-fill-mode: forwards;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
        
    </style>
</head>
<body>
    <h1 id="hellow">HELLOOOOOW!</h1>
</body>
<script>
    window.onload = function() {
        document.getElementById('hellow').classList.add('fade-in')
    }
</script>
</html>
